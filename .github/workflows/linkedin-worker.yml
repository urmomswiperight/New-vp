name: LinkedIn Outreach Worker

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Operation Mode (OUTREACH, FOLLOW_UP, CHECK_INBOX, REPLY)'
        required: true
        default: 'OUTREACH'
      profileUrl:
        description: 'LinkedIn Profile URL (for OUTREACH)'
        required: false
      message:
        description: 'Message Content (for OUTREACH, REPLY)'
        required: false
      leadId:
        description: 'ID of the lead in Supabase'
        required: false
      threadUrl:
        description: 'LinkedIn Message Thread URL (for REPLY)'
        required: false

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Worker Script
        env:
          MODE: ${{ github.event.inputs.mode }}
          PROFILE_URL: ${{ github.event.inputs.profileUrl }}
          MESSAGE: ${{ github.event.inputs.message }}
          LEAD_ID: ${{ github.event.inputs.leadId }}
          THREAD_URL: ${{ github.event.inputs.threadUrl }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LI_USERNAME: ${{ secrets.LI_USERNAME }}
          LI_PASSWORD: ${{ secrets.LI_PASSWORD }}
          LI_SESSION: ${{ secrets.LI_SESSION }}
          N8N_INBOUND_WEBHOOK_URL: ${{ secrets.N8N_INBOUND_WEBHOOK_URL }}
          BYPASS_SESSION_HEALTH: 'false'
        run: npx tsx scripts/linkedin-worker.ts
